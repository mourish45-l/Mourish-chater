<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mourish AI | 3.1 Pro Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <style>
        body { background: #030712; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .chat-container { max-width: 850px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        
        /* CLEAN HIGHLIGHT: No symbols, just color */
        mark { background: #fbbf24; color: #000; padding: 1px 4px; border-radius: 4px; font-weight: 600; font-style: normal; }
        
        /* Code Block UI */
        pre { position: relative; border-radius: 16px !important; margin: 20px 0 !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        .copy-btn {
            position: absolute; right: 12px; top: 12px; z-index: 10;
            background: #4f46e5; color: white; padding: 6px 14px; 
            border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .copy-btn:hover { transform: scale(1.05); background: #6366f1; }
        
        .source-tag { font-size: 11px; color: #818cf8; background: rgba(129, 140, 248, 0.1); padding: 2px 8px; border-radius: 6px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body class="p-2 sm:p-4">

    <div class="chat-container glass rounded-[2.5rem] shadow-2xl overflow-hidden">
        <header class="p-6 border-b border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                </div>
                <div>
                    <h1 class="font-bold text-lg">Mourish <span class="text-indigo-400">Pro</span></h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-tighter">3.1 Flash-Lite Engine</p>
                </div>
            </div>
        </header>

        <div id="msg-area" class="flex-1 overflow-y-auto p-6 space-y-6 scroll-smooth"></div>

        <div class="p-6 bg-black/20">
            <div class="relative flex items-center gap-3">
                <input type="text" id="user-in" placeholder="Ask for facts, code, or research..." 
                    class="flex-1 bg-slate-900/80 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-indigo-600 transition-all">
                <button id="send-btn" class="bg-indigo-600 p-4 rounded-2xl hover:bg-indigo-500 active:scale-90 transition-all">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // IMPORTANT: Use your AIza... key here
        const API_KEY = "AIzaSyClrFIR_6xGsUAekVCiGmRNEw7DKCTGJgc"; 
        const genAI = new GoogleGenerativeAI(API_KEY);
        
        const model = genAI.getGenerativeModel({ 
            model: "gemini-3.1-flash-lite-preview",
            systemInstruction: "You are a factual assistant. 1. Wrap important facts or names in [[double square brackets]] so I can highlight them. 2. Do NOT use backticks for highlighting. 3. List Sources at the end."
        });

        const msgArea = document.getElementById('msg-area');
        const userIn = document.getElementById('user-in');

        async function chat() {
            const val = userIn.value.trim();
            if(!val) return;
            addMsg(val, 'user');
            userIn.value = "";

            try {
                const result = await model.generateContent(val);
                addMsg(result.response.text(), 'ai');
            } catch (e) { addMsg("Error: " + e.message, 'error'); }
        }

        function addMsg(text, type) {
            const row = document.createElement('div');
            row.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'}`;

            // PROCESS TEXT
            let html = text
                // Clean Highlight: Convert [[text]] to <mark>text</mark> (strips the brackets)
                .replace(/\[\[([\s\S]*?)\]\]/g, '<mark>$1</mark>')
                
                // Markdown Bold
                .replace(/\*\*([\s\S]*?)\*\*/g, '<b>$1</b>')

                // Code Blocks
                .replace(/```(\w+)?([\s\S]*?)```/g, (m, l, c) => {
                    return `<div class="relative"><button class="copy-btn" onclick="cp(this)">COPY</button><pre><code class="language-${l||'js'}">${c.trim()}</code></pre></div>`;
                })

                // Sources Styling
                .replace(/Sources:([\s\S]*)/gi, '<div class="source-tag">SOURCES</div><div class="text-[11px] mt-1 text-slate-500 italic">$1</div>')
                
                .replace(/\n/g, '<br>');

            row.innerHTML = `<div class="p-4 rounded-[20px] max-w-[85%] text-sm ${type==='user'?'bg-indigo-600 text-white rounded-tr-none':'bg-slate-800/60 rounded-tl-none border border-white/5'}">${html}</div>`;
            
            msgArea.appendChild(row);
            msgArea.scrollTop = msgArea.scrollHeight;
            Prism.highlightAll();
        }

        window.cp = (b) => {
            navigator.clipboard.writeText(b.nextElementSibling.innerText);
            b.innerText = "COPIED";
            setTimeout(() => b.innerText = "COPY", 2000);
        };

        document.getElementById('send-btn').onclick = chat;
        userIn.onkeydown = (e) => { if(e.key === 'Enter') chat(); };
    </script>
</body>
</html>
