<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mourish AI 3.1 | Clean Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .app-container { max-width: 900px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Highlight & Text Styling */
        mark { background: #facc15; color: #000; padding: 0 4px; border-radius: 4px; font-weight: 700; }
        .clean-header { font-size: 1.25rem; font-weight: 800; color: #818cf8; margin-bottom: 8px; display: block; }
        
        /* Code Block */
        pre { position: relative; border-radius: 16px !important; margin: 16px 0 !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        .action-btn { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .copy-code-btn { position: absolute; right: 12px; top: 12px; background: #4f46e5; color: white; }
        
        /* Message Bubbles */
        .bubble { position: relative; line-height: 1.6; }
        .copy-msg-btn { margin-top: 10px; background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); width: fit-content; }
        .copy-msg-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body class="p-2 sm:p-4">

    <div class="app-container glass-panel rounded-[2rem] shadow-2xl overflow-hidden">
        <header class="p-5 border-b border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-black shadow-lg">M</div>
                <div>
                    <h1 class="font-bold text-base leading-none">Mourish Assistant</h1>
                    <p class="text-[9px] uppercase tracking-[0.2em] text-indigo-400 mt-1">Gemini 3.1 Flash-Lite</p>
                </div>
            </div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-8 scroll-smooth"></div>

        <div class="p-6 bg-black/20">
            <div class="relative flex items-center gap-3">
                <input type="text" id="user-input" placeholder="Ask for facts or code..." 
                    class="flex-1 bg-slate-900 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-indigo-600 transition-all">
                <button id="send-btn" class="bg-indigo-600 p-4 rounded-2xl hover:scale-105 active:scale-95 transition-all">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "AIzaSyClrFIR_6xGsUAekVCiGmRNEw7DKCTGJgc"; 
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ 
            model: "gemini-3.1-flash-lite-preview",
            systemInstruction: "You are a professional assistant. Rules: 1. NEVER use symbols like ###, ***, or backticks. 2. For headers, just write the text. 3. Wrap important facts in [[square brackets]] for highlighting. 4. List Sources: at the end."
        });

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            renderMessage(text, 'user');
            userInput.value = "";

            try {
                const result = await model.generateContent(text);
                renderMessage(result.response.text(), 'ai');
            } catch (e) {
                renderMessage("Error: " + e.message, 'error');
            }
        }

        function renderMessage(text, role) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            // CLEANING LOGIC: Remove Markdown Symbols
            let cleanHtml = text
                .replace(/###\s?(.*)/g, '<span class="clean-header">$1</span>') // Convert ### to Header
                .replace(/\*\*\*(.*?)\*\*\*/g, '$1') // Remove ***
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>') // Keep simple bold
                .replace(/\[\[(.*?)\]\]/g, '<mark>$1</mark>') // Highlight [[text]]
                .replace(/```(\w+)?([\s\S]*?)```/g, (m, lang, code) => { // Clean Code Blocks
                    return `<div class="relative"><button class="action-btn copy-code-btn" onclick="copyCode(this)">COPY CODE</button><pre><code class="language-${lang || 'js'}">${code.trim()}</code></pre></div>`;
                })
                .replace(/Sources:([\s\S]*)/gi, '<div class="mt-4 pt-2 border-t border-white/10 text-[11px] text-slate-500">Sources: $1</div>')
                .replace(/\n/g, '<br>');

            div.innerHTML = `
                <div class="bubble p-5 rounded-[22px] max-w-[85%] text-sm ${role === 'user' ? 'bg-indigo-600 rounded-tr-none' : 'bg-slate-800/60 border border-white/5 rounded-tl-none'}">
                    <div class="message-text">${cleanHtml}</div>
                    ${role === 'ai' ? `<button class="action-btn copy-msg-btn" onclick="copyMsg(this)">COPY TEXT</button>` : ''}
                </div>
            `;

            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            Prism.highlightAll();
        }

        window.copyCode = (btn) => {
            const code = btn.nextElementSibling.innerText;
            navigator.clipboard.writeText(code);
            btn.innerText = "COPIED";
            setTimeout(() => btn.innerText = "COPY CODE", 2000);
        };

        window.copyMsg = (btn) => {
            const text = btn.previousElementSibling.innerText;
            navigator.clipboard.writeText(text);
            btn.innerText = "COPIED";
            setTimeout(() => btn.innerText = "COPY TEXT", 2000);
        };

        document.getElementById('send-btn').onclick = sendMessage;
        userInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
